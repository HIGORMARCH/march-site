<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Página não encontrada — March Contabilidade</title>
<link rel="icon" type="image/png" href="assets/marca/3.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ouro:#B8945A;--ouro-cl:#D4B273;--ouro-esc:#8B6F3D;--bg:#4D4B40;--txt:#E4DCCB;--txt2:#9a9387;--bord:rgba(184,148,90,.25)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px}
  .box{max-width:520px}
  img{height:64px;margin-bottom:30px;opacity:.9}
  .cod{font-size:88px;font-weight:700;color:var(--ouro-cl);line-height:1;letter-spacing:-2px}
  h1{font-size:24px;font-weight:600;margin:14px 0 10px;color:#F0E9D8}
  p{color:var(--txt2);font-size:16px;line-height:1.6;margin-bottom:30px}
  a.btn{display:inline-block;background:linear-gradient(135deg,var(--ouro),var(--ouro-esc));color:#1a1206;font-weight:600;text-decoration:none;padding:13px 26px;border-radius:9px;transition:transform .2s}
  a.btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div class="box">
    <img src="assets/marca/3.png" alt="March Contabilidade">
    <div class="cod">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você tentou acessar não existe ou foi movido. Vamos te levar de volta ao início.</p>
    <a class="btn" href="/">Voltar para a página inicial</a>
  </div>
</body>
</html>
